apply plugin: "com.android.application"
apply plugin: "kotlin-android"

android {
    buildToolsVersion "34.0.0"
    compileSdkVersion 34
    namespace "com.patientapp"

    defaultConfig {
        applicationId "com.patientapp"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}


dependencies {
    implementation("com.facebook.react:react-android:0.73.9")
    implementation("com.facebook.react:hermes-android:0.73.9")
    implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")
    implementation project(':react-native-razorpay') 
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.20"
    

    
}